<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Přihlášení – KsichtKniha</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>

<main class="page narrow">
  <div class="auth-header">
    <span class="auth-logo">Ksicht<span>Kniha</span></span>
    <p class="auth-tagline">Sociální síť pro studenty</p>
  </div>

  <div class="card">
    <div class="card-body">
      <div id="login-error" class="form-error"></div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="login-username">Uživatelské jméno</label>
          <input type="text" id="login-username" name="username"
                 placeholder="např. jan.novak" autocomplete="username" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="login-password">Heslo</label>
          <input type="password" id="login-password" name="password"
                 placeholder="••••••••" autocomplete="current-password" required>
        </div>

        <button type="submit" class="btn btn-primary" style="width:100%">
          Přihlásit se
        </button>
      </form>
    </div>
  </div>

  <p class="auth-switch">
    Nemáš účet? <a href="/register.html">Registruj se</a>
  </p>
</main>

<script type="module" src="/js/login.js"></script>
</body>
</html>
