<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KsichtKniha</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css">
</head>
<body>

<nav id="navbar" style="display:none">
    <div class="nav-inner">
        <a class="nav-logo" href="#" onclick="navigate('wall')">Ksicht<span>Kniha</span></a>
        <div class="nav-links" id="nav-links"></div>
        <div class="nav-user" id="nav-user"></div>
    </div>
</nav>

<div id="page"></div>

<!-- EDIT POST MODAL -->
<div class="modal-overlay" id="edit-modal" style="display:none">
    <div class="modal">
        <div class="modal-title">Upravit příspěvek</div>
        <div class="form-group">
            <label class="form-label">Nadpis</label>
            <input type="text" id="edit-title" placeholder="Nadpis příspěvku">
        </div>
        <div class="form-group">
            <label class="form-label">Text</label>
            <textarea id="edit-content" rows="4" placeholder="Co je nového?"></textarea>
        </div>
        <div id="edit-error" class="form-error" style="display:none"></div>
        <div class="modal-footer">
            <button class="btn btn-outline" onclick="closeEditModal()">Zrušit</button>
            <button class="btn btn-primary" onclick="saveEditPost()">Uložit</button>
        </div>
    </div>
</div>
<script src="./index.js"></script>
</body>
</html>
