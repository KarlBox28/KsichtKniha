<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KsichtKniha</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/quill/1.3.7/quill.snow.min.css">
</head>
<body>

<nav id="navbar">
    <div class="nav-inner">
        <a class="nav-logo" href="#" onclick="navigate('wall')">Ksicht<span>Kniha</span></a>
        <div class="nav-links" id="nav-links"></div>
        <div class="nav-user" id="nav-user"></div>
    </div>
</nav>

<div id="page"></div>

<!-- EDIT PROFILE MODAL -->
<div class="modal-overlay" id="profile-modal" style="display:none">
    <div class="modal">
        <div class="modal-title">Upravit profil</div>
        <div class="profile-modal-avatar-wrap">
            <img id="profile-modal-preview" class="profile-modal-avatar">
            <label class="profile-modal-avatar-btn" title="Změnit profilovku">
                📷
                <input type="file" id="profile-modal-photo" accept="image/*" onchange="previewProfilePhoto(this)" style="display:none">
            </label>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem">
            <div class="form-group">
                <label class="form-label">Jméno</label>
                <input type="text" id="profile-modal-fname" placeholder="Jméno">
            </div>
            <div class="form-group">
                <label class="form-label">Příjmení</label>
                <input type="text" id="profile-modal-lname" placeholder="Příjmení">
            </div>
        </div>
        <div class="form-group">
            <label class="form-label">Pohlaví</label>
            <select id="profile-modal-gender">
                <option value="M">Muž</option>
                <option value="F">Žena</option>
                <option value="O">Jiné</option>
            </select>
        </div>
        <div id="profile-modal-error" class="form-error" style="display:none"></div>
        <div class="modal-footer">
            <button class="btn btn-outline" onclick="closeProfileModal()">Zrušit</button>
            <button class="btn btn-primary" id="profile-modal-save-btn" onclick="saveProfile()">Uložit</button>
        </div>
    </div>
</div>

<!-- EDIT POST MODAL -->
<div class="modal-overlay" id="edit-modal" style="display:none">
    <div class="modal">
        <div class="modal-title">Upravit příspěvek</div>
        <div class="form-group">
            <label class="form-label">Nadpis</label>
            <input type="text" id="edit-title" placeholder="Nadpis příspěvku">
        </div>
        <div class="form-group">
            <label class="form-label">Text</label>
            <div id="edit-quill-editor" style="height:160px"></div>
        </div>
        <div class="form-group">
            <label class="file-label">
                Změnit obrázek
                <input type="file" id="edit-np-image" accept="image/*" onchange="showEditPostFileName(this)">
            </label>
            <span class="file-name" id="edit-np-fname"></span>
        </div>
        <div id="edit-error" class="form-error" style="display:none"></div>
        <div class="modal-footer">
            <button class="btn btn-outline" onclick="closeEditModal()">Zrušit</button>
            <button class="btn btn-primary" onclick="saveEditPost()">Uložit</button>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/quill/1.3.7/quill.min.js"></script>
<script src="./index.js"></script>
<script>
    window.editQuill = new Quill('#edit-quill-editor', {
        theme: 'snow',
        placeholder: 'Uprav text příspěvku…',
        modules: {
            toolbar: [
                ['bold', 'italic', 'underline', 'strike'],
                [{ list: 'ordered' }, { list: 'bullet' }],
                ['link'],
                ['clean']
            ]
        }
    });
</script>
</body>
</html>
